<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Jornada viagens</title>
  </head>
  <body>
    <!-- LOGO -->
    <header>
      <a class="logo" href="index.html"
        ><img
          class="img-mobile"
          src="img/Bússola-branca.png"
          alt="Bussola do logo Jornada Viagens na cor preta"
        />
        <img
          class="img-desktop"
          src="img/Bussola e titulo.png"
          alt="Logo jornada viagens branca"
        />
      </a>

      <!-- MENU HAMBURGUER -->
      <div class="navegation-menu">
        <label for="menu">
          <img src="img/menu hamburguer.png" alt="menu" />
        </label>
        <input type="checkbox" id="menu" hidden />
        <!-- LINKS -->
        <nav>
          <ul class="list-links">
            <li>
              <a href="blog.html" target="_blank" title="Acessar Blog">Blog</a>
            </li>
            <li>
              <a
                href="pacotes.html"
                target="_blank"
                title="Acessar Pacotes de viagem"
                >Pacotes de viagem</a
              >
            </li>
            <li>
              <a href="contato.html" target="_blank" title="Acessar Contato"
                >Contato</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- SECTIONS -->
    <section class="hero">
      <div class="hero-img"></div>
      <h2>
        Somos uma agência apaixonada por criar viagens inesquecíveis. Do destino
        à seleção das atividades, cuidamos de todos os detalhes para que você
        aproveite ao máximo cada momento da sua jornada!
      </h2>
    </section>

    <section class="offers">
      <div class="section-title">
        <h2>Ofertas da semana</h2>
        <hr />
      </div>
      <div class="offers-cards">
        <article class="card">
          <header>
            <p>HOTEL+AÉREO</p>
            <h3>
              Japão <br />
              <span>R$ 4000</span>
            </h3>
          </header>
          <footer> <a href="#" class="button">Ver detalhes</a></footer>
        </article>
      </div>
    </section>
  </body>
</html>
